<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkBridge - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body text-center">
                        <h2 class="mb-4">TalkBridge</h2>
                        <input type="text" id="username" class="form-control mb-3" placeholder="Username">
                        <select id="language" class="form-select mb-3">
                            <option value="en-US">English</option>
                            <option value="es-ES">Spanish</option>
                            <option value="fr-FR">French</option>
                            <option value="hi-IN">Hindi</option>
                        </select>
                        <button onclick="login()" class="btn btn-primary w-100 mb-2">Login / Register</button>
                    </div>
                </div>
                
                <div id="roomSection" class="card shadow mt-3 d-none">
                    <div class="card-body text-center">
                        <h4>Welcome!</h4>
                        <button onclick="createRoom()" class="btn btn-success w-100 mb-2">Create Room</button>
                        <hr>
                        <input type="text" id="roomCodeInput" class="form-control mb-2" placeholder="Room Code">
                        <button onclick="joinRoom()" class="btn btn-secondary w-100">Join Room</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        // Simple Auth Logic for prototype
        async function login() {
            const username = document.getElementById('username').value;
            const lang = document.getElementById('language').value;
            // In real app, call /api/auth/register
            localStorage.setItem('username', username);
            localStorage.setItem('lang', lang);
            document.getElementById('roomSection').classList.remove('d-none');
        }

        async function createRoom() {
            // Mock API Call
            const code = Math.random().toString(36).substring(7).toUpperCase();
            window.location.href = `room.html?room=${code}`;
        }

        async function joinRoom() {
            const code = document.getElementById('roomCodeInput').value;
            window.location.href = `room.html?room=${code}`;
        }
    </script>
</body>
</html>
