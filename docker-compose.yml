version: '3.8'

services:
db:
image: postgres:13
volumes:
- postgres_data:/var/lib/postgresql/data
environment:
- POSTGRES_DB=talkbridge
- POSTGRES_USER=postgres
- POSTGRES_PASSWORD=postgres

redis:
image: redis:6-alpine

backend:
build: ./backend
command: daphne -b 0.0.0.0 -p 8000 talkbridge.asgi:application
volumes:
- ./backend:/app
ports:
- "8000:8000"
environment:
- POSTGRES_DB=talkbridge
- POSTGRES_USER=postgres
- POSTGRES_PASSWORD=postgres
- POSTGRES_HOST=db
- REDIS_HOST=redis
- GOOGLE_APPLICATION_CREDENTIALS=/app/google_credentials.json
depends_on:
- db
- redis

nginx:
image: nginx:alpine
volumes:
- ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
- ./frontend:/usr/share/nginx/html
ports:
- "80:80"
- "443:443"
depends_on:
- backend

volumes:
postgres_data: